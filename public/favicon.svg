<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    @keyframes roll {
      from { transform: rotate(0deg); transform-origin: 32px 32px; }
      to { transform: rotate(360deg); transform-origin: 32px 32px; }
    }
    .tyre { animation: roll 3s linear infinite; }
  </style>
  <g class="tyre">
    <!-- Outer tyre -->
    <circle cx="32" cy="32" r="30" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <!-- Tread grooves -->
    <circle cx="32" cy="32" r="28" fill="none" stroke="#2a2a2a" stroke-width="4"/>
    <!-- Tread marks -->
    <line x1="32" y1="2" x2="32" y2="8" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <line x1="52.2" y1="8.6" x2="49" y2="13.8" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <line x1="61.4" y1="27" x2="55.6" y2="28.4" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <line x1="55.4" y1="48.2" x2="50.4" y2="45" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <line x1="38.6" y1="61" x2="37" y2="55.4" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <line x1="18" y1="58.4" x2="20.2" y2="53" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <line x1="5" y1="43" x2="10.6" y2="41.2" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <line x1="3.4" y1="23" x2="9" y2="24.6" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <line x1="14" y1="8" x2="17.6" y2="12.8" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <line x1="44" y1="59" x2="42" y2="53.6" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <line x1="59" y1="38" x2="53.4" y2="36.8" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <line x1="47" y1="5.4" x2="44.4" y2="10.8" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <!-- Inner sidewall -->
    <circle cx="32" cy="32" r="20" fill="#111" stroke="#222" stroke-width="1"/>
    <!-- Rim -->
    <circle cx="32" cy="32" r="15" fill="#666" stroke="#777" stroke-width="0.5"/>
    <!-- Rim shine -->
    <circle cx="32" cy="32" r="14" fill="url(#rimShine)"/>
    <!-- Spokes -->
    <line x1="32" y1="18" x2="32" y2="46" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="18.8" y1="25" x2="45.2" y2="39" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="18.8" y1="39" x2="45.2" y2="25" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Center hub -->
    <circle cx="32" cy="32" r="6" fill="#555" stroke="#666" stroke-width="1"/>
    <!-- Center cap - red accent -->
    <circle cx="32" cy="32" r="3.5" fill="#e11d48"/>
    <!-- Bolt holes -->
    <circle cx="32" cy="26" r="1.2" fill="#444"/>
    <circle cx="37.2" cy="29" r="1.2" fill="#444"/>
    <circle cx="35.6" y1="35" cx2="35.6" cy="35.8" r="1.2" fill="#444"/>
    <circle cx="28.4" cy="35.8" r="1.2" fill="#444"/>
    <circle cx="26.8" cy="29" r="1.2" fill="#444"/>
  </g>
  <defs>
    <radialGradient id="rimShine" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#999" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#444" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
